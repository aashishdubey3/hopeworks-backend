<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HopeWorks - A Platform for NGOs</title>
    <!-- 1. Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 2. Load React & ReactDOM -->
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <!-- 3. Load Babel to transpile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Razorpay Checkout Script -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
        /* Base styles */
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f8f8f0; color: #4A5D23; }
        /* Custom styles */
        .cause { font-size: 0.9em; color: #555; font-style: italic; }
        .progress-bar { background-color: #e9ede4; border-radius: 30px; margin: 10px 0; height: 15px; overflow: hidden; }
        .progress { background-color: #6B8E23; height: 100%; border-radius: 30px; }
        .progress-text { font-size: 0.9em; font-weight: bold; text-align: center; margin-top: -15px; }
        .event-date { background-color: #4A5D23; color: #fff; border-radius: 8px; padding: 15px; text-align: center; min-width: 80px; }
        .event-date .month { display: block; font-size: 0.9em; font-weight: bold; }
        .event-date .day { display: block; font-size: 2em; font-weight: bold; line-height: 1.1; }
        .announcement-item { background-color: #ffffff; border-left: 4px solid #6B8E23; padding: 15px 20px; margin-bottom: 15px; border-radius: 0 5px 5px 0; }
        .announcement-date { font-size: 0.9em; font-weight: bold; color: #555; margin-bottom: 5px; }
        /* Simple scrollbar */
        .dashboard-list::-webkit-scrollbar { width: 8px; }
        .dashboard-list::-webkit-scrollbar-track { background: #e9ede4; border-radius: 4px; }
        .dashboard-list::-webkit-scrollbar-thumb { background: #6B8E23; border-radius: 4px; }
        .dashboard-list::-webkit-scrollbar-thumb:hover { background: #4A5D23; }
        /* Style for file input */
        input[type="file"] { border: 1px solid #ccc; padding: 6px; border-radius: 4px; background-color: white; }
        input[type="file"]::file-selector-button { margin-right: 8px; border: none; background: #6B8E23; padding: 6px 10px; border-radius: 4px; color: #fff; cursor: pointer; transition: background .2s ease-in-out; }
        input[type="file"]::file-selector-button:hover { background: #4A5D23; }
        /* Image preview */
        .image-preview { max-width: 100px; max-height: 100px; border-radius: 50%; object-fit: cover; border: 2px solid #e9ede4; margin-top: 5px; }
        .campaign-image-preview { max-width: 200px; max-height: 120px; border-radius: 8px; object-fit: cover; border: 1px solid #ccc; margin-top: 5px; }
        /* Loading Spinner */
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #6B8E23;
            margin: 20px auto;
            animation: spin 1s ease infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* Custom button variant for Danger */
        .btn-danger {
            background-color: #dc2626; /* red-600 */
            color: white;
        }
        .btn-danger:hover {
            background-color: #b91c1c; /* red-700 */
        }
    </style>
</head>
<body class="max-w-4xl mx-auto p-5">

    <div id="root"></div>

    <script type="text/babel">

        const { useState, useEffect, createContext, useContext, useRef } = React;
        const API_BASE_URL = 'https://hopeworks.onrender.com';
        const API_URL = `${API_BASE_URL}/api`;
        const RAZORPAY_KEY_ID_FRONTEND = 'rzp_test_RXe8cwJVgzxVNr';

        // --- Navigation Context ---
        const NavigationContext = createContext();
        function useNavigation() { return useContext(NavigationContext); }

        // --- Reusable Components ---
        function Header() {
            const { navigate, loggedInNgo, setLoggedInNgo } = useNavigation();
            const [dropdownOpen, setDropdownOpen] = useState(false);
            const handleLogout = () => { localStorage.removeItem('loggedInNgoId'); setLoggedInNgo(null); navigate('home'); };
            return (
                <header className="flex flex-col sm:flex-row justify-between items-center border-b border-gray-300 mb-10 pb-5">
                    <h1 className="text-3xl font-bold text-[#3D402D] mb-4 sm:mb-0"><a href="#" onClick={(e) => { e.preventDefault(); navigate('home'); }}>HopeWorks Platform</a></h1>
                    <nav><ul className="flex items-center gap-2 sm:gap-4">
                        <li><a href="#" onClick={(e) => { e.preventDefault(); navigate('home'); }} className="p-2 rounded-md hover:bg-[#e9ede4]">Home</a></li>
                        <li><a href="#" onClick={(e) => { e.preventDefault(); navigate('ngos'); }} className="p-2 rounded-md hover:bg-[#e9ede4]">Find NGOs</a></li>
                        <li className="relative">
                            <button onClick={() => setDropdownOpen(!dropdownOpen)} className="p-2 rounded-md hover:bg-[#e9ede4]">Events, News & Campaigns ▾</button>
                            {dropdownOpen && ( <div className="absolute left-0 mt-2 w-52 bg-[#fdfdf5] border border-gray-300 rounded-lg shadow-lg z-10">
                                <a href="#" onClick={(e) => { e.preventDefault(); navigate('news'); setDropdownOpen(false); }} className="block px-4 py-2 hover:bg-[#e9ede4]">Latest News</a>
                                <a href="#" onClick={(e) => { e.preventDefault(); navigate('events'); setDropdownOpen(false); }} className="block px-4 py-2 hover:bg-[#e9ede4]">Upcoming Events</a>
                                <a href="#" onClick={(e) => { e.preventDefault(); navigate('all-campaigns'); setDropdownOpen(false); }} className="block px-4 py-2 hover:bg-[#e9ede4]">All Campaigns</a>
                            </div>)}
                        </li>
                        {loggedInNgo ? (<>
                            <li><a href="#" onClick={(e) => { e.preventDefault(); navigate('ngo-dashboard'); }} className="p-2 rounded-md hover:bg-[#e9ede4]">Dashboard</a></li>
                            <li><button onClick={handleLogout} className="p-2 rounded-md text-red-600 hover:bg-[#e9ede4]">Logout</button></li>
                        </>) : (<li><a href="#" onClick={(e) => { e.preventDefault(); navigate('donate', {}); }} className="px-4 py-2 rounded-md bg-[#6B8E23] text-white hover:bg-[#4A5D23]">Donate</a></li>)}
                    </ul></nav>
                </header>
            );
        }
        function Footer() {
            const { navigate, loggedInNgo } = useNavigation();
            return (
                <footer className="text-center mt-12 pt-5 border-t border-gray-300 text-gray-600">
                    <div className="flex justify-center flex-wrap gap-4 md:gap-6 mb-4">
                        <a href="#" onClick={(e) => { e.preventDefault(); navigate('about'); }} className="font-bold text-[#4A5D23]">About Us</a>
                        <a href="#" onClick={(e) => { e.preventDefault(); navigate('contact'); }} className="font-bold text-[#4A5D23]">Contact Us</a>
                        <a href="#" onClick={(e) => { e.preventDefault(); navigate('admin'); }} className="font-bold text-[#4A5D23]">Admin</a>
                        {!loggedInNgo && (<a href="#" onClick={(e) => { e.preventDefault(); navigate('ngo-login'); }} className="font-bold text-[#4A5D23]">NGO Login</a>)}
                    </div>
                    <p>&copy; 2025 HopeWorks Platform. All Rights Reserved.</p>
                </footer>
            );
        }
        function Layout({ children }) { return (<><Header /><main>{children}</main><Footer /></>); }
        function Button({ children, onClick, type = 'button', variant = 'primary', className = '', disabled = false }) {
            const baseStyles = "inline-flex items-center justify-center px-6 py-3 rounded-md transition-colors";
            let variantStyles = '';
            switch(variant) {
                case 'secondary':
                    variantStyles = 'bg-transparent text-[#6B8E23] border border-[#6B8E23] hover:bg-[#e9ede4]';
                    break;
                case 'danger':
                    variantStyles = 'bg-red-600 text-white hover:bg-red-700';
                    break;
                default: // primary
                    variantStyles = 'bg-[#6B8E23] text-white hover:bg-[#4A5D23]';
            }
            return (<button type={type} onClick={onClick} className={`${baseStyles} ${variantStyles} ${className} ${disabled ? 'opacity-50 cursor-not-allowed' : ''}`} disabled={disabled}>{children}</button>);
        }
        function FormInput({ label, type = 'text', value, onChange, name, required, disabled, children, hint, accept }) {
            const inputProps = { value: type !== 'file' ? value : undefined, onChange, name, required, disabled, accept, className: "w-full p-3 border border-gray-300 rounded-md mt-1 disabled:bg-gray-100" };
             const fileInputClasses = "w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-violet-50 file:text-[#6B8E23] hover:file:bg-violet-100 disabled:opacity-50 disabled:pointer-events-none";
            return (<p><label className="font-bold block mb-1">{label}:</label>{ type === 'textarea' ? (<textarea {...inputProps} rows="4"></textarea>) : type === 'select' ? (<select {...inputProps}>{children}</select>) : type === 'file' ? (<input type="file" {...inputProps} className={fileInputClasses} />) : (<input type={type} {...inputProps} />)}{hint && <span className="text-sm text-gray-500 block mt-1">{hint}</span>}</p>);
        }
        function DashboardCard({ title, list, renderItem, className = '' }) {
            return (<div className={`bg-white p-6 rounded-lg border border-gray-300 ${className}`}> <h3 className="text-xl font-bold mb-4 pb-2 border-b border-gray-200">{title}</h3> <ul className="space-y-3 max-h-64 overflow-y-auto dashboard-list pr-2">{Array.isArray(list) && list.length > 0 ? (list.map((item, index) => (<li key={item?.id || index} className="pb-2 border-b border-gray-100 last:border-b-0">{renderItem(item)}</li>))) : (<li>No data yet.</li>)}</ul></div>);
        }
        function Spinner({ primary = true }) {
            const color = primary ? 'text-white' : 'text-[#6B8E23]';
            return (
                <svg className={`animate-spin -ml-1 mr-3 h-5 w-5 ${color}`} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                    <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            );
        }

        // --- Helper Function ---
        function findNgoByName(ngoList, name) {
            if (!Array.isArray(ngoList)) return undefined;
            return ngoList.find(ngo => ngo && ngo.name === name);
        }

        // --- Helper: Construct full image URL ---
        function getImageUrl(relativePath) {
            if (!relativePath) { return 'https://placehold.co/100x100/eee/aaa?text=No+Image'; }
            // If it's already a full URL (e.g., from placehold.co or an external link), use it directly
            if (relativePath.startsWith('http://') || relativePath.startsWith('https://')) { return relativePath; }
            // Otherwise, construct it from the base URL
            return `${API_BASE_URL}${relativePath}`;
        }

        // --- Helper: Format date for forms (YYYY-MM-DD) ---
        function formatDateForInput(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            return date.toISOString().split('T')[0];
        }


        // --- Page Components ---

        // --- HomePage ---
        function HomePage() {
            const { navigate } = useNavigation();
            const [campaigns, setCampaigns] = useState([]); const [campaignsLoading, setCampaignsLoading] = useState(true); const [campaignsError, setCampaignsError] = useState(null);
            const [featuredNgos, setFeaturedNgos] = useState([]); const [featuredNgosLoading, setFeaturedNgosLoading] = useState(true); const [featuredNgosError, setFeaturedNgosError] = useState(null);
            const [allNgos, setAllNgos] = useState([]);
            const isMounted = useRef(true);

            useEffect(() => {
                isMounted.current = true;
                setCampaignsLoading(true); setFeaturedNgosLoading(true); setCampaignsError(null); setFeaturedNgosError(null);
                const fetchCampaigns = fetch(API_URL + '/campaigns').then(res => res.ok ? res.json() : Promise.reject('Failed campaign fetch'));
                const fetchAllNgos = fetch(API_URL + '/ngos').then(res => res.ok ? res.json() : Promise.reject('Failed NGO fetch'));
                const fetchFeaturedNgos = fetch(API_URL + '/ngos/featured').then(res => res.ok ? res.json() : Promise.reject('Failed featured NGO fetch'));

                Promise.all([fetchCampaigns, fetchAllNgos, fetchFeaturedNgos])
                    .then(([campaignData, allNgoData, featuredNgoData]) => {
                        if (isMounted.current) {
                            setCampaigns(campaignData.slice(0, 2)); setAllNgos(allNgoData); setFeaturedNgos(featuredNgoData);
                        }
                    })
                    .catch(err => {
                        console.error("Failed homepage data fetch:", err);
                        const errorMsg = (err instanceof TypeError && err.message === 'Failed to fetch') ? 'Connection Error: Could not reach the server.' : `Error loading data: ${err.message}`;
                        if (isMounted.current) {
                            setCampaignsError(errorMsg); setFeaturedNgosError(errorMsg);
                        }
                    })
                    .finally(() => {
                        if (isMounted.current) {
                            setCampaignsLoading(false); setFeaturedNgosLoading(false);
                        }
                    });
                
                return () => { isMounted.current = false; };
            }, []);

            return (
                <div>
                    <section className="hero bg-[#e9ede4] p-10 rounded-lg text-center mb-12"><h2 className="text-4xl font-bold mb-4">Amplify Your Impact.</h2><p className="text-lg mb-6">Discover and support trusted NGOs.</p><Button onClick={() => navigate('ngos')}>Find an NGO</Button></section>
                    <section className="mb-12">
                        <h2 className="text-3xl font-bold mb-6 text-center">Organizations Spotlight</h2>
                        {featuredNgosLoading && <p className="text-center">Loading organizations...</p>}
                        {featuredNgosError && <p className="text-center text-red-600">{featuredNgosError}</p>}
                        {!featuredNgosLoading && !featuredNgosError && (
                            <div className="grid md:grid-cols-2 gap-6">
                                {Array.isArray(featuredNgos) && featuredNgos.length > 0 ? (
                                    featuredNgos.map(ngo => (
                                        <article key={ngo.id} className="border border-gray-300 p-5 rounded-lg text-center bg-white">
                                            <img src={getImageUrl(ngo.logo)} alt={`${ngo.name} Logo`} className="w-20 h-20 rounded-full object-cover mx-auto mb-4"/>
                                            <h3 className="text-2xl font-bold">{ngo.name}</h3>
                                            <p className="cause">{ngo.cause}</p>
                                            <p className="my-4 text-gray-700">Focusing on {ngo.cause.toLowerCase()}.</p>
                                            <Button onClick={() => navigate('profile', { id: ngo.id })} variant="secondary">View Profile</Button>
                                        </article>
                                    ))
                                ) : ( <p className="col-span-full text-center">No organizations to spotlight.</p> )}
                            </div>
                        )}
                    </section>
                    <section className="hero bg-[#e9ede4] p-10 rounded-lg text-center mb-12">
                        <h2 className="text-3xl font-bold mb-4">Active Campaigns</h2><p className="mb-6">Support time-sensitive projects.</p>
                        {campaignsLoading && <p>Loading campaigns...</p>}
                        {campaignsError && (<div className="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative text-left max-w-lg mx-auto" role="alert"><strong className="font-bold">Error: </strong><span className="block sm:inline">{campaignsError}</span></div>)}
                        {!campaignsLoading && !campaignsError && (<>
                            <div className="grid md:grid-cols-2 gap-6 bg-white p-6 rounded-lg mt-4">
                                {Array.isArray(campaigns) && campaigns.length > 0 ? (campaigns.map(campaign => { const progressPercent = campaign.goalAmount > 0 ? Math.min(100, Math.round((campaign.raisedAmount / campaign.goalAmount) * 100)) : 0; const hostingNgo = findNgoByName(allNgos, campaign.host); return (<article key={campaign.id} className="campaign-card text-left"><img src={getImageUrl(campaign.imageUrl)} alt={campaign.title} className="w-full h-48 object-cover rounded-lg mb-4" onError={(e) => { e.target.onerror = null; e.target.src='https://placehold.co/600x400/eee/aaa?text=Error'; }}/><h3 className="text-2xl font-bold">{campaign.title}</h3><p className="text-sm text-gray-600 mb-2">by {campaign.host}</p><p className="my-2">{campaign.description}</p><div className="progress-bar"><div className="progress" style={{width: `${progressPercent}%`}}></div></div><p className="progress-text"><strong>₹{(campaign.raisedAmount || 0).toLocaleString('en-IN')}</strong> raised of ₹{campaign.goalAmount.toLocaleString('en-IN')} goal</p>
                                    <Button onClick={() => navigate('donate', { ngo: hostingNgo, campaignId: campaign.id })} variant="primary" className="mt-4" disabled={!hostingNgo}>Donate to {campaign.host}</Button>
                                    {!hostingNgo && <p className="text-xs text-red-500 mt-1">Donation link unavailable</p>}
                                </article>); })) : (<p className="col-span-full">No featured campaigns.</p>)}
                            </div>
                            <Button onClick={() => navigate('all-campaigns')} variant="secondary" className="mt-6">View All Campaigns</Button>
                        </>)}
                    </section>
                    <section className="cta-banner bg-[#e9ede4] p-10 rounded-lg text-center mb-12"><h2 className="text-3xl font-bold mb-4">Are you an NGO?</h2><p className="text-lg mb-6">Join our network.</p><Button onClick={() => navigate('register')}>Register Now</Button></section>
                </div>
            );
        }

        // --- NgoListPage ---
        function NgoListPage() {
            const { navigate } = useNavigation();
            const [ngos, setNgos] = useState([]); const [searchTerm, setSearchTerm] = useState(''); const [loading, setLoading] = useState(true); const [error, setError] = useState(null);
            useEffect(() => { fetch(API_URL + '/ngos').then(res => res.json()).then(data => { setNgos(data); setLoading(false); }).catch(err => { console.error(err); setError('Could not load NGOs.'); setLoading(false); }); }, []);
            const filteredNgos = Array.isArray(ngos) ? ngos.filter(ngo => ngo.name.toLowerCase().includes(searchTerm.toLowerCase()) || ngo.cause.toLowerCase().includes(searchTerm.toLowerCase())) : [];
            return (
                <div>
                    <section className="mb-8"> <h2 className="text-3xl font-bold mb-4">Find an Organization</h2> <input type="text" id="ngoSearch" placeholder="Search by name or cause" className="w-full p-3 border border-gray-300 rounded-md" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} /> </section>
                    <section className="ngo-directory">
                        {loading && <p className="text-center">Loading NGOs...</p>}
                        {error && <p className="text-center text-red-600">{error}</p>}
                        {!loading && !error && ( <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {filteredNgos.length > 0 ? ( filteredNgos.map(ngo => (<article key={ngo.id} className="border border-gray-300 p-5 rounded-lg text-center bg-white"><img src={getImageUrl(ngo.logo)} alt={`${ngo.name} Logo`} className="w-20 h-20 rounded-full object-cover mx-auto mb-4"/><h3 className="text-2xl font-bold">{ngo.name}</h3><p className="cause">{ngo.cause}</p><p className="text-sm text-gray-500 mt-2 truncate">{ngo.address}</p><div className="mt-4"><Button onClick={() => navigate('profile', { id: ngo.id })} variant="secondary">View Profile</Button></div></article>))) : (<p className="text-center col-span-full">No NGOs match your search.</p>)}
                        </div>)}
                    </section>
                </div>
            );
        }

        // --- ProfilePage ---
        function ProfilePage({ ngoId }) {
            const { navigate } = useNavigation();
            const [ngo, setNgo] = useState(null); const [loading, setLoading] = useState(true); const [error, setError] = useState(null); const [ngoEvents, setNgoEvents] = useState([]); const [ngoNews, setNgoNews] = useState([]); const [ngoCampaigns, setNgoCampaigns] = useState([]); const [relatedDataLoading, setRelatedDataLoading] = useState(true);
            useEffect(() => { setLoading(true); setRelatedDataLoading(true); setError(null); const fetchNgoData = fetch(`${API_URL}/ngos/${ngoId}`).then(res => { if (!res.ok) throw new Error('NGO not found'); return res.json(); }); const fetchEvents = fetch(`${API_URL}/ngos/${ngoId}/events`).then(res => res.json()); const fetchNews = fetch(`${API_URL}/ngos/${ngoId}/news`).then(res => res.json()); const fetchCampaigns = fetch(`${API_URL}/ngos/${ngoId}/campaigns`).then(res => res.json()); Promise.all([fetchNgoData, fetchEvents, fetchNews, fetchCampaigns]).then(([ngoData, eventsData, newsData, campaignsData]) => { setNgo(ngoData); setNgoEvents(eventsData); setNgoNews(newsData); setNgoCampaigns(campaignsData); setLoading(false); setRelatedDataLoading(false); }).catch(err => { console.error("Error fetching profile data:", err); setError(err.message || 'Could not load profile info.'); setLoading(false); setRelatedDataLoading(false); }); }, [ngoId]);
            if (loading) return <p className="text-center">Loading profile...</p>; if (error) return <p className="text-center text-red-600">Error: {error}</p>; if (!ngo) return null;
            const formatDate = (dateString) => { const date = new Date(dateString); return date.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }); };
            const getDirectionsLink = () => { if (ngo && ngo.address) { return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(ngo.address)}`; } return '#'; };

            return (
                <div>
                    <section className="flex flex-col sm:flex-row items-center gap-6 p-6 bg-white rounded-lg border border-gray-300 mb-8"><img id="profile-logo" src={getImageUrl(ngo.logo)} alt={`${ngo.name} Logo`} className="w-32 h-32 rounded-full object-cover"/><div><h2 id="profile-name" className="text-4xl font-bold">{ngo.name}</h2><p className="cause text-2xl" id="profile-cause">{ngo.cause}</p></div></section>
                    <div className="grid md:grid-cols-3 gap-8">
                        <div className="md:col-span-2 space-y-8">
                            <section className="bg-white p-6 rounded-lg border border-gray-300"><h3 className="text-2xl font-bold mb-4">About Us</h3><p id="profile-description" className="text-lg leading-relaxed">{ngo.description}</p></section>
                            <section className="bg-white p-6 rounded-lg border border-gray-300"><h3 className="text-2xl font-bold mb-4">Active Campaigns</h3>{relatedDataLoading ? (<p>Loading campaigns...</p>) : Array.isArray(ngoCampaigns) && ngoCampaigns.length > 0 ? ( <div className="space-y-6">{ngoCampaigns.map(campaign => { const progressPercent = campaign.goalAmount > 0 ? Math.min(100, Math.round((campaign.raisedAmount / campaign.goalAmount) * 100)) : 0; return (<article key={campaign.id} className="campaign-card text-left border-b pb-4 last:border-b-0"><img src={getImageUrl(campaign.imageUrl)} alt={campaign.title} className="w-full h-40 object-cover rounded-lg mb-3" onError={(e) => { e.target.onerror = null; e.target.src='https://placehold.co/600x400/eee/aaa?text=Error'; }}/><h4 className="text-xl font-bold">{campaign.title}</h4><p className="my-1 text-gray-700">{campaign.description}</p><div className="progress-bar my-1"><div className="progress" style={{width: `${progressPercent}%`}}></div></div><p className="progress-text"><strong>₹{(campaign.raisedAmount || 0).toLocaleString('en-IN')}</strong> of ₹{campaign.goalAmount.toLocaleString('en-IN')} goal</p>
                                <Button onClick={() => navigate('donate', { ngo: ngo, campaignId: campaign.id })} variant="secondary" className="mt-2 py-1 px-3 text-sm">Donate Now</Button>
                            </article>); })}</div>) : (<p>No active campaigns.</p>)}</section>

                if (isDeleting === id) return; // Prevent double clicks
                
                // Use a custom modal in a real app
                if (!window.confirm(`Are you sure you want to PERMANENTLY delete this ${typeName}: ${name}? This action cannot be undone.`)) {
                    return;

                if (!isMounted.current) return;
                setIsDeleting(id); // Set loading state for this specific item
                setError('');

                try {
                    const response = await fetch(`${API_URL}/admin/${type}/${id}`, {
                        method: 'DELETE',
                        headers: { 'Content-Type': 'application/json' }
                        // No body needed for admin delete, auth is session-based
                    });
                    const result = await response.json();
                    if (!response.ok) {
                        throw new Error(result.message || `Failed to delete ${typeName}`);
                    }
                    if (isMounted.current) {
                        console.log(`Admin deleted ${typeName}: ${id}`);
                        fetchData(); // Refresh all data

        function ManageContentPage({ ngo, onEditClick }) {
            const [myEvents, setMyEvents] = useState([]);

            const [loading, setLoading] = useState(true);

            const isMounted = useRef(true);

            const fetchData = () => {
                if (!isMounted.current) return;
                setLoading(true); setError('');
                const fetchEvents = fetch(`${API_URL}/ngos/${ngo.id}/events`).then(res => res.json());
                const fetchNews = fetch(`${API_URL}/ngos/${ngo.id}/news`).then(res => res.json());
                const fetchCampaigns = fetch(`${API_URL}/ngos/${ngo.id}/campaigns`).then(res => res.json());

                Promise.all([fetchEvents, fetchNews, fetchCampaigns])
                    .then(([eventsData, newsData, campaignsData]) => {
                        if (isMounted.current) {
                            setMyEvents(eventsData);
                            setMyNews(newsData);
                            setMyCampaigns(campaignsData);
                        }
                    })
                    .catch(err => {
                        console.error("Error fetching content:", err);
                        if (isMounted.current) { setError("Could not load content. Please try again."); }
                    })
                    .finally(() => {
                         if (isMounted.current) setLoading(false);
                    });
            };

            useEffect(() => {
                isMounted.current = true;
                fetchData();
                return () => { isMounted.current = false; };
            }, [ngo.id]);

            const handleDelete = async (type, id) => {
                // Use custom modal in real app
                if (!window.confirm(`Are you sure you want to delete this ${type.slice(0, -1)}? This action cannot be undone.`)) {
                    return;
                }
                try {
                    const response = await fetch(`${API_URL}/${type}/${id}`, {
                        method: 'DELETE',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ngoId: ngo.id })
                    });
                    const result = await response.json();
                    if (!response.ok) {
                        throw new Error(result.message || 'Failed to delete');
                    }
                    if (isMounted.current) fetchData();
                } catch (err) {
                    console.error(`Error deleting ${type}:`, err);
                    alert(`Error: ${err.message}`); // Use custom modal in real app
                }

                    <section className="bg-white p-6 rounded-lg border border-gray-300">

        function EditCampaignForm({ ngo, campaignId, onCancel, onSave }) {
            const [formData, setFormData] = useState({ title: '', description: '', goalAmount: '', imageUrl: '' });
            const [campaignImageFile, setCampaignImageFile] = useState(null);
            const [imagePreview, setImagePreview] = useState(null);
            const [error, setError] = useState('');
            const [success, setSuccess] = useState('');
            const [isLoading, setIsLoading] = useState(true);
            const [goalAmountDisabled, setGoalAmountDisabled] = useState(false);
            const isMounted = useRef(true);

             useEffect(() => {
                 isMounted.current = true;
                 setError(''); setIsLoading(true);
                 fetch(`${API_URL}/campaigns/${campaignId}`)
                     .then(res => { if (!res.ok) throw new Error('Failed to fetch campaign data'); return res.json(); })
                     .then(data => {
                         if (isMounted.current) {
                             setFormData({ title: data.title, description: data.description, goalAmount: data.goalAmount, imageUrl: data.imageUrl });
                             setImagePreview(getImageUrl(data.imageUrl));
                             if (data.raisedAmount > 0) {
                                 setGoalAmountDisabled(true);
                             }
                             setIsLoading(false);
                         }
                     })
                     .catch(err => { console.error(err); if (isMounted.current) setError("Could not load campaign data."); });
                 return () => { isMounted.current = false; };
            }, [campaignId]);

            const handleTextChange = (e) => { setFormData({ ...formData, [e.target.name]: e.target.value }); };
            const handleFileChange = (e) => { const file = e.target.files[0]; if (file) { setCampaignImageFile(file); setImagePreview(URL.createObjectURL(file)); } else { setCampaignImageFile(null); setImagePreview(getImageUrl(formData.imageUrl)); } };
            
            const handleSubmit = async (e) => {
                e.preventDefault(); setError(''); setSuccess(''); setIsLoading(true);
                const submissionData = new FormData();
                submissionData.append('title', formData.title);
                submissionData.append('description', formData.description);
                submissionData.append('goalAmount', formData.goalAmount);
                submissionData.append('ngoId', ngo.id);
                if (campaignImageFile) {
                    submissionData.append('campaignImage', campaignImageFile);
                }
                
                try {
                    const response = await fetch(`${API_URL}/campaigns/${campaignId}`, { method: 'PUT', body: submissionData });
                    if (isMounted.current) {
                        const result = await response.json();
                        if (response.ok) {
                            setSuccess('Campaign updated!');
                            setTimeout(() => { if (isMounted.current) onSave(); }, 1500);
                        } else { setError(result.message || 'Failed to update.'); }

                finally { if (isMounted.current) setIsLoading(false); }
            };

            if (isLoading && !formData.title) return <p className="text-center">Loading campaign editor...</p>;

            return (
                <section className="max-w-xl mx-auto bg-white p-6 rounded-lg border border-gray-300">

                            <span className="text-xs text-gray-500 block mt-1">Upload new image (max 5MB). Leave blank to keep current.</span>

                        return (
                            <>
                                <Button onClick={handleOnCancel} variant="secondary" className="mb-4">&larr; Back to Manage Content</Button>
                                <EditEventForm ngo={ngo} eventId={editingItemId} onCancel={handleOnCancel} onSave={handleOnSave} />
                            </>
                        );
                    case 'edit-news':
                        return (
                            <>
                                <Button onClick={handleOnCancel} variant="secondary" className="mb-4">&larr; Back to Manage Content</Button>
                                <EditNewsForm ngo={ngo} newsId={editingItemId} onCancel={handleOnCancel} onSave={handleOnSave} />
                            </>
                        );
                    case 'edit-campaign':
                         return (
                             <>
                                <Button onClick={handleOnCancel} variant="secondary" className="mb-4">&larr; Back to Manage Content</Button>
                                <EditCampaignForm ngo={ngo} campaignId={editingItemId} onCancel={handleOnCancel} onSave={handleOnSave} />
                             </>
                        );
                    default:
                        setDashboardView('main');
                        return null;
                }
            };

            return (
                <div>
                    {renderDashboardView()}
                </div>
            );
        } // End of NgoDashboardPage

        // --- All Campaigns Page ---
        function AllCampaignsPage() {
             const { navigate } = useNavigation();
            const [campaigns, setCampaigns] = useState([]); const [loading, setLoading] = useState(true); const [error, setError] = useState(null); const [allNgos, setAllNgos] = useState([]);
            useEffect(() => { const fetchCampaigns = fetch(API_URL + '/campaigns').then(res => res.ok ? res.json() : Promise.reject('Fail campaign fetch')); const fetchNgos = fetch(API_URL + '/ngos').then(res => res.ok ? res.json() : Promise.reject('Fail NGO fetch')); Promise.all([fetchCampaigns, fetchNgos]).then(([campaignData, ngoData]) => { setCampaigns(campaignData); setAllNgos(ngoData); setLoading(false); }).catch(err => { console.error("Failed campaigns page data:", err); setError('Could not load.'); setLoading(false); }); }, []);
            return (
                 <div>
                    <section className="hero bg-[#e9ede4] p-10 rounded-lg text-center mb-12"><h2 className="text-4xl font-bold mb-4">All Active Campaigns</h2><p className="text-lg">Support ongoing projects.</p></section>
                    <section className="campaign-list space-y-8">
                        {loading && <p className="text-center">Loading...</p>} {error && <p className="text-center text-red-600">{error}</p>}
                        {!loading && !error && ( Array.isArray(campaigns) && campaigns.length > 0 ? ( <div className="grid md:grid-cols-2 gap-8"> {campaigns.map(campaign => { const progressPercent = campaign.goalAmount > 0 ? Math.min(100, Math.round((campaign.raisedAmount / campaign.goalAmount) * 100)) : 0; const hostingNgo = findNgoByName(allNgos, campaign.host); return ( <article key={campaign.id} className="campaign-card text-left bg-white p-6 rounded-lg border border-gray-300 flex flex-col"><img src={getImageUrl(campaign.imageUrl)} alt={campaign.title} className="w-full h-48 object-cover rounded-lg mb-4" onError={(e) => { e.target.onerror = null; e.target.src='https://placehold.co/600x400/eee/aaa?text=Error'; }}/><h3 className="text-2xl font-bold">{campaign.title}</h3><p className="text-sm text-gray-600 mb-2">by {campaign.host}</p><p className="my-2 flex-grow">{campaign.description}</p><div className="progress-bar mt-auto"><div className="progress" style={{width: `${progressPercent}%`}}></div></div><p className="progress-text"><strong>₹{(campaign.raisedAmount || 0).toLocaleString('en-IN')}</strong> raised of ₹{campaign.goalAmount.toLocaleString('en-IN')} goal</p>
                            <Button onClick={() => navigate('donate', { ngo: hostingNgo, campaignId: campaign.id })} variant="primary" className="mt-4 w-full" disabled={!hostingNgo}>Donate to {campaign.host}</Button>
                            {!hostingNgo && <p className="text-xs text-red-500 mt-1 text-center">Donation link unavailable</p>}
                        </article> ); })} </div> ) : (<p className="text-center col-span-full">No active campaigns.</p>) )}
                    </section>
                </div>
            );
        }

        // --- Main App Component (Router) ---
        function App() {
            const [page, setPage] = useState({ name: 'home' }); const [loggedInNgo, setLoggedInNgo] = useState(localStorage.getItem('loggedInNgoId'));
            const navigate = (pageName, params = {}) => { setPage({ name: pageName, ...params }); window.scrollTo(0, 0); };
            const renderPage = () => {
                const pageId = page.id;
                switch (page.name) {
                    case 'home': return <HomePage />;
                    case 'ngos': return <NgoListPage />;
                    case 'profile': return <ProfilePage ngoId={pageId} />;
                    case 'events': return <EventsPage />;
                    case 'news': return <NewsPage />;
                    case 'all-campaigns': return <AllCampaignsPage />;
                    case 'about': return <AboutPage />;
                    case 'contact': return <ContactPage />;
                    case 'register': return <RegisterPage />;
                    case 'donate': return <DonatePage ngo={page.ngo} campaignId={page.campaignId} />;
                    case 'admin': return <AdminLoginPage />;
                    case 'admin-dashboard': return <AdminDashboardPage />;
                    case 'ngo-login': return <NgoLoginPage />;
                    case 'ngo-forgot-password': return <NgoForgotPasswordPage />;
                    case 'ngo-dashboard': return <NgoDashboardPage />;
                    default: return <HomePage />;
                }
            };
            const contextValue = { navigate, page, loggedInNgo, setLoggedInNgo };
            return (<NavigationContext.Provider value={contextValue}><Layout>{renderPage()}</Layout></NavigationContext.Provider>);
        }

        // --- Render the App ---
        ReactDOM.render(<App />, document.getElementById('root'));

    </script>

    <!-- Chatbot Script -->
    <script src="//code.tidio.co/ubb7zk6lzkmemeyr9lkfameaoz2yecih.js" async></script>

</body>
